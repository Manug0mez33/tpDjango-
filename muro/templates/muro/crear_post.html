{% extends 'muro/base.html' %}

{% block title %}Crear Post{% endblock %}

{% block content %}
    <h2>Crear Nuevo Post</h2>
    <form method="post">

        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Crear Post</button>
    </form>
    <button class="btn-volver"><a href="{% url 'muro' %}">Volver al Muro</a></button>
{% endblock %}
