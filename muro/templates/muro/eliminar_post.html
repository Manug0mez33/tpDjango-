{% extends 'muro/base.html' %}

{% block title %}Eliminar Post{% endblock %}

{% block content %}
    <h2>Eliminar Post</h2>
    <p>¿Estás seguro de que quieres eliminar este post?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: #f44336;">Sí, eliminar</button>
        <button class="btn-volver"><a href="{% url 'muro' %}">No, volver al Muro</a></button>
    </form>
{% endblock %}
